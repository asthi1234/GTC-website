<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Menu | Brew &amp; Bloom</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* ── Scene & Book ── */
    .flip-scene {
      perspective: 2200px;
      display: flex; justify-content: center; align-items: center;
      min-height: 80vh; padding: 32px 0 60px;
    }
    .book {
      position: relative;
      width: min(460px, 92vw);
      height: 620px;
      transform-style: preserve-3d;
    }
    .page {
      position: absolute; inset: 0;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform .85s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      border-radius: 0 16px 16px 0;
    }
    .page.flipped { transform: rotateY(-180deg); }
    .face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 0 16px 16px 0;
      border: 1px solid rgba(212,165,116,.30);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      overflow: hidden;
      background: linear-gradient(160deg, rgba(44,24,16,.96), rgba(25,14,9,.98));
    }
    .face.back { transform: rotateY(180deg); }
    /* cover face */
    .face.cover-face {
      background: linear-gradient(155deg, #3b1f0e, #6b3a1f, #3b1f0e);
    }
    /* ── Page spine shadow ── */
    .page::before {
      content: "";
      position: absolute; left: 0; top: 0; bottom: 0; width: 18px;
      background: linear-gradient(90deg, rgba(0,0,0,.45), transparent);
      z-index: 10; border-radius: 0 0 0 0; pointer-events: none;
    }
    /* ── Page content ── */
    .face-inner {
      padding: 28px 24px; height: 100%;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .page-title {
      font-size: 1.25rem; font-weight: 900;
      color: var(--accent); margin-bottom: 4px;
      display: flex; align-items: center; gap: 10px;
    }
    /* ── Dish row inside flip book ── */
    .flip-dish {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 12px; align-items: center;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(212,165,116,.18);
      background: rgba(250,245,237,.05);
      transition: background .18s, border-color .18s;
    }
    .flip-dish:hover {
      background: rgba(250,245,237,.09);
      border-color: rgba(212,165,116,.40);
    }
    .flip-dish img {
      width: 72px; height: 72px; border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(212,165,116,.25);
    }
    .flip-dish-info { display: flex; flex-direction: column; gap: 4px; }
    .flip-dish-name { font-weight: 800; font-size: .95rem; line-height: 1.2; }
    .flip-dish-meta { font-size: .8rem; opacity: .72; }
    .flip-dish-price { font-weight: 900; color: var(--accent); font-size: 1rem; }
    .flip-dish-actions {
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .fav-btn {
      background: transparent; border: 0;
      font-size: 1.1rem; cursor: pointer;
      color: rgba(250,245,237,.7);
      transition: transform .2s, color .2s;
      padding: 2px;
    }
    .fav-btn:hover { transform: scale(1.25); color: #e05c7a; }
    .fav-btn.active { color: #e05c7a; }
    .add-btn {
      padding: 6px 12px; border-radius: 999px; font-size: .8rem;
      font-weight: 700; cursor: pointer; border: 1px solid rgba(212,165,116,.55);
      background: rgba(212,165,116,.18); color: var(--cream);
      transition: background .18s, transform .18s;
      white-space: nowrap;
    }
    .add-btn:hover { background: rgba(212,165,116,.40); transform: scale(1.04); }
    .add-btn.added { background: rgba(34,197,94,.25); border-color: rgba(34,197,94,.5); }
    /* ── Stars ── */
    .stars-row { display: flex; align-items: center; gap: 4px; }
    .star { font-size: .75rem; color: rgba(212,165,116,.4); }
    .star.on { color: var(--accent); }
    /* ── Cover page ── */
    .cover-inner {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; height: 100%; padding: 32px;
      gap: 16px;
    }
    .cover-logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: radial-gradient(circle at 30% 25%,
        rgba(250,245,237,.55), rgba(212,165,116,.35) 35%, rgba(44,24,16,.2) 70%),
        linear-gradient(145deg, rgba(212,165,116,.5), rgba(250,245,237,.12));
      border: 1px solid rgba(212,165,116,.4);
      box-shadow: 0 14px 40px rgba(0,0,0,.5);
      margin-bottom: 8px;
    }
    .cover-title { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 900; color: var(--cream); }
    .cover-sub   { color: var(--accent); font-size: 1.05rem; font-weight: 600; }
    /* ── Controls ── */
    .flip-controls {
      display: flex; justify-content: center; align-items: center;
      gap: 14px; margin-top: 18px; flex-wrap: wrap;
    }
    .flip-indicator {
      display: flex; gap: 6px; align-items: center;
    }
    .flip-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(212,165,116,.25);
      transition: background .3s, transform .3s;
    }
    .flip-dot.active {
      background: var(--accent); transform: scale(1.35);
    }
    /* ── Cart badge ── */
    .flip-cart-badge {
      position: fixed; bottom: 28px; right: 28px; z-index: 100;
      background: linear-gradient(135deg, rgba(212,165,116,.95), rgba(212,165,116,.6));
      color: #25160e; font-weight: 900;
      padding: 14px 20px; border-radius: 999px;
      border: 1px solid rgba(212,165,116,.6);
      box-shadow: 0 12px 32px rgba(0,0,0,.4);
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; font-size: .95rem;
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
    }
    .flip-cart-badge:hover { transform: translateY(-3px); box-shadow: 0 18px 40px rgba(0,0,0,.5); }
    .flip-cart-count {
      background: #25160e; color: var(--accent);
      border-radius: 999px; padding: 2px 8px; font-size: .82rem;
    }
    /* ── Navbar icon-count ── */
    .icon-count {
      position: absolute; top: -8px; right: -8px;
      min-width: 18px; height: 18px; padding: 0 5px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; background: rgba(212,165,116,.95);
      color: #25160e; font-weight: 800; font-size: .75rem;
    }
    .profile { position: relative; }
    .dropdown {
      position: absolute; right: 0; top: 50px;
      width: min(220px, 80vw); display: none;
      border-radius: 18px; overflow: hidden;
      border: 1px solid rgba(212,165,116,.30);
      background: rgba(17,10,7,.9);
      backdrop-filter: blur(16px); z-index: 200;
    }
    .dropdown.open { display: block; }
    .dropdown a, .dropdown button {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; border: 0; background: transparent;
      color: rgba(250,245,237,.92); cursor: pointer; font-weight: 600;
      font-size: .95rem; text-decoration: none; font: inherit;
    }
    .dropdown a:hover, .dropdown button:hover { background: rgba(250,245,237,.07); }
    /* ── Toast notification ── */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(34,197,94,.18); border: 1px solid rgba(34,197,94,.4);
      color: var(--cream); padding: 12px 22px; border-radius: 999px;
      font-weight: 700; font-size: .9rem; opacity: 0;
      transition: opacity .3s, transform .3s; z-index: 500;
      backdrop-filter: blur(12px); white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* ── Page curl effect ── */
    .page::after {
      content: "";
      position: absolute; bottom: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 0 28px 28px;
      border-color: transparent transparent rgba(212,165,116,.25) transparent;
      border-radius: 0 0 14px 0;
      pointer-events: none; z-index: 5;
      transition: border-width .2s;
    }
    .page:hover::after { border-width: 0 0 40px 40px; }
  </style>
</head>
<body>

  <!-- ══════════ NAVBAR ══════════ -->
  <header class="navbar">
    <div class="container">
      <div class="navbar-inner glass">
        <div class="brand" role="banner">
          <img src="./image/logo.png" alt="Brew &amp; Bloom logo" class="logo" />
          <div>
            <h1 class="h1" style="font-size:1.05rem;">Brew &amp; Bloom</h1>
            <span>Flip Menu</span>
          </div>
        </div>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="menu.html">Menu</a>
          <a href="flipmenu.html" style="border-color:rgba(212,165,116,.45);background:rgba(250,245,237,.06);">Flip Book</a>
          <a href="reserve.html">Reserve</a>
        </nav>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="icon-btn ripple" id="cartBtn" aria-label="Open cart" style="position:relative;">
            🛒 <span class="icon-count" data-cart-count>0</span>
          </button>
          <div class="profile">
            <button class="icon-btn ripple" id="profileBtn" aria-label="Account">👤</button>
            <div class="dropdown glass" id="profileDropdown">
              <a href="menu.html"><span>🍽️ Full Menu</span><span>→</span></a>
              <a href="checkout.html"><span>🛍️ Checkout</span><span>→</span></a>
              <a href="reserve.html"><span>🪑 Reserve</span><span>→</span></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ══════════ MAIN ══════════ -->
  <main class="section" style="padding-top:20px;">
    <div class="container" style="text-align:center;">
      <div class="small muted reveal">Interactive experience</div>
      <div class="h2 reveal" style="margin-top:6px;">Flip through the menu</div>
      <p class="small muted reveal" style="margin-top:8px;line-height:1.6;">
        Turn pages to explore categories — add to cart &amp; wishlist without leaving the book.
      </p>
    </div>

    <!-- FLIP BOOK -->
    <div class="flip-scene">
      <div class="book" id="book">
        <!-- Pages injected by JS -->
      </div>
    </div>

    <!-- Page dots + controls -->
    <div class="flip-controls">
      <button class="btn btn-ghost ripple" id="prevBtn" style="padding:12px 22px;">⬅ Previous</button>
      <div class="flip-indicator" id="flipIndicator"></div>
      <button class="btn btn-primary ripple" id="nextBtn" style="padding:12px 22px;">Next ➡</button>
    </div>

    <div style="text-align:center;margin-top:18px;">
      <a href="menu.html" class="btn btn-ghost ripple" style="padding:10px 20px;">
        Switch to grid view →
      </a>
    </div>
  </main>

  <!-- Cart float badge -->
  <a class="flip-cart-badge" href="checkout.html" id="cartBadge">
    🛒 View Cart <span class="flip-cart-count" id="cartBadgeCount">0</span>
  </a>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <footer class="footer" style="padding:28px 0;">
    <div class="container">
      <div class="small muted" style="text-align:center;">
        © <span id="year"></span> Brew &amp; Bloom — Demo UI
      </div>
    </div>
  </footer>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
  <script>
  'use strict';
  document.getElementById('year').textContent = new Date().getFullYear();

  /* ── Profile dropdown ── */
  const profileBtn = document.getElementById('profileBtn');
  const profileDropdown = document.getElementById('profileDropdown');
  profileBtn.addEventListener('click', e => { e.stopPropagation(); profileDropdown.classList.toggle('open'); });
  document.addEventListener('click', () => profileDropdown.classList.remove('open'));

  /* ── Toast helper ── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ── Cart count sync ── */
  function syncCartCount() {
    const count = (window.BB?.loadCart?.() || []).reduce((s,i) => s + (i.qty||0), 0);
    document.querySelectorAll('[data-cart-count]').forEach(el => el.textContent = count);
    document.getElementById('cartBadgeCount').textContent = count;
  }

  /* ── Stars HTML ── */
  function starsHtml(rating) {
    let h = '';
    for (let i = 1; i <= 5; i++) {
      h += `<span class="star ${i <= Math.round(rating) ? 'on' : ''}">★</span>`;
    }
    return h;
  }

  /* ── Favorites ── */
  function getFavs() {
    try { return JSON.parse(localStorage.getItem('bb_favs_v1') || '[]'); } catch { return []; }
  }
  function setFavs(f) { localStorage.setItem('bb_favs_v1', JSON.stringify(f)); }
  function toggleFav(id) {
    const f = getFavs(); const idx = f.indexOf(id);
    if (idx >= 0) f.splice(idx,1); else f.push(id);
    setFavs(f); return f;
  }

  /* ── Build a dish row ── */
  function buildDishRow(dish) {
    const discounted = dish.discountPct
      ? Math.round(dish.price - dish.price * dish.discountPct / 100) : dish.price;
    const isFav = getFavs().includes(dish.id);

    const row = document.createElement('div');
    row.className = 'flip-dish';
    row.dataset.dishId = dish.id;
    row.innerHTML = `
      <img src="${dish.image}" alt="${dish.name}" loading="lazy" />
      <div class="flip-dish-info">
        <div class="flip-dish-name">${dish.name}</div>
        <div class="stars-row">${starsHtml(dish.rating)}
          <span style="font-size:.78rem;opacity:.7;margin-left:4px;">${dish.rating.toFixed(1)}</span>
        </div>
        <div class="flip-dish-meta">${dish.veg ? '🥦 Veg' : '🍗 Non-Veg'} • ${dish.timeMin} min
          ${dish.discountPct ? `<span style="color:rgba(212,165,116,.9);margin-left:6px;">${dish.discountPct}% OFF</span>` : ''}
        </div>
        <div class="flip-dish-price">₹${discounted}
          ${dish.discountPct ? `<s style="font-size:.8rem;opacity:.55;margin-left:6px;">₹${dish.price}</s>` : ''}
        </div>
      </div>
      <div class="flip-dish-actions">
        <button class="fav-btn ${isFav ? 'active' : ''}" data-fav="${dish.id}" aria-label="Wishlist">
          ${isFav ? '♥' : '♡'}
        </button>
        <button class="add-btn" data-add="${dish.id}">+ Cart</button>
      </div>
    `;

    row.querySelector(`[data-add="${dish.id}"]`).addEventListener('click', e => {
      e.stopPropagation();
      if (window.BB?.addToCart) window.BB.addToCart(dish.id, 1);
      const btn = row.querySelector(`[data-add="${dish.id}"]`);
      btn.textContent = '✓ Added'; btn.classList.add('added');
      setTimeout(() => { btn.textContent = '+ Cart'; btn.classList.remove('added'); }, 1400);
      showToast(`✓ ${dish.name} added to cart`);
      syncCartCount();
    });

    row.querySelector(`[data-fav="${dish.id}"]`).addEventListener('click', e => {
      e.stopPropagation();
      const favs = toggleFav(dish.id);
      const btn  = row.querySelector(`[data-fav="${dish.id}"]`);
      const on   = favs.includes(dish.id);
      btn.textContent = on ? '♥' : '♡';
      btn.classList.toggle('active', on);
      showToast(on ? `♥ Added to wishlist` : `Removed from wishlist`);
    });

    return row;
  }

  /* ── Build the book ── */
  document.addEventListener('DOMContentLoaded', () => {
    const book      = document.getElementById('book');
    const indicator = document.getElementById('flipIndicator');
    const cats      = window.BREWBLOOM_CATEGORIES || [];
    const dishes    = window.BREWBLOOM_DISHES     || [];
    const pages     = [];
    let   current   = 0;

    /* Group dishes by category — 3 per page face */
    const pageData = []; // [{title, emoji, dishes:[]}]

    // Cover page (no dishes)
    pageData.push({ type: 'cover' });

    cats.forEach(cat => {
      const catDishes = dishes.filter(d => d.categoryId === cat.id);
      // Split into chunks of 3
      for (let i = 0; i < catDishes.length; i += 3) {
        pageData.push({
          type   : 'dishes',
          title  : cat.name,
          emoji  : cat.emoji,
          dishes : catDishes.slice(i, i + 3)
        });
      }
    });

    // Back cover
    pageData.push({ type: 'backcover' });

    /* Pair pages into book leaves (front/back) */
    // Each physical page (leaf) shows one face on front, next face on back
    const leaves = [];
    for (let i = 0; i < pageData.length; i += 2) {
      leaves.push({ front: pageData[i], back: pageData[i + 1] || null });
    }

    /* Build a face element */
    function buildFace(data, side) {
      const face = document.createElement('div');
      face.className = `face ${side}`;

      if (!data) {
        face.innerHTML = '<div class="face-inner"></div>';
        return face;
      }

      if (data.type === 'cover') {
        face.classList.add('cover-face');
        face.innerHTML = `
          <div class="cover-inner">

            <!-- ── Logo mark ── -->
            <div style="position:relative; margin-bottom:6px;">
              <!-- Outer glow ring -->
              <div style="
                position:absolute; inset:-14px; border-radius:50%;
                background:radial-gradient(circle, rgba(212,165,116,.35), transparent 68%);
                filter:blur(8px);
                animation:pulseGlow 2.6s cubic-bezier(.2,.8,.2,1) infinite;
              "></div>
              <!-- Logo circle -->
              <div style="
                width:96px; height:96px; border-radius:28px;
                border:2px solid rgba(212,165,116,.55);
                box-shadow:
                  0 0 0 6px rgba(212,165,116,.10),
                  0 18px 48px rgba(0,0,0,.55);
                display:flex; align-items:center; justify-content:center;
                position:relative; z-index:1; overflow:hidden;
                background:rgba(44,24,16,.4);
              ">
                <img src="./image/logo.png" alt="Brew &amp; Bloom"
                     style="width:84px; height:84px; object-fit:contain;
                            filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));" />
              </div>
            </div>

            <!-- ── Brand name ── -->
            <div style="margin-top:4px;">
              <div class="cover-title" style="
                font-size:clamp(1.7rem,5vw,2.4rem);
                background:linear-gradient(135deg,#faf5ed,#d4a574,#faf5ed);
                -webkit-background-clip:text; -webkit-text-fill-color:transparent;
                background-clip:text;
                letter-spacing:-.02em; line-height:1.1;
              ">Brew &amp; Bloom</div>
            </div>

            <!-- ── Tagline ── -->
            <div class="cover-sub" style="
              font-size:.95rem; letter-spacing:.12em; text-transform:uppercase;
              opacity:.85; margin-top:2px;
            ">Premium Café</div>

            <!-- ── Divider ── -->
            <div style="
              width:60px; height:2px; border-radius:999px;
              background:linear-gradient(90deg, transparent, rgba(212,165,116,.7), transparent);
              margin:14px auto;
            "></div>

            <!-- ── Category pills ── -->
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:2px;">
              <span style="padding:5px 12px; border-radius:999px;
                border:1px solid rgba(212,165,116,.3); background:rgba(212,165,116,.1);
                font-size:.78rem; font-weight:600; color:rgba(250,245,237,.85);">☕ Coffee</span>
              <span style="padding:5px 12px; border-radius:999px;
                border:1px solid rgba(212,165,116,.3); background:rgba(212,165,116,.1);
                font-size:.78rem; font-weight:600; color:rgba(250,245,237,.85);">🍕 Pizza</span>
              <span style="padding:5px 12px; border-radius:999px;
                border:1px solid rgba(212,165,116,.3); background:rgba(212,165,116,.1);
                font-size:.78rem; font-weight:600; color:rgba(250,245,237,.85);">🍰 Desserts</span>
              <span style="padding:5px 12px; border-radius:999px;
                border:1px solid rgba(212,165,116,.3); background:rgba(212,165,116,.1);
                font-size:.78rem; font-weight:600; color:rgba(250,245,237,.85);">🍔 Burgers</span>
            </div>

            <!-- ── Hint ── -->
            <div style="
              margin-top:22px; display:flex; align-items:center; gap:8px;
              color:rgba(212,165,116,.7); font-size:.82rem; font-weight:600;
            ">
              <span style="
                display:inline-block; width:28px; height:28px; border-radius:50%;
                border:1.5px solid rgba(212,165,116,.4);
                display:flex; align-items:center; justify-content:center;
                animation:scroll 1.8s ease-in-out infinite;
              ">→</span>
              Click Next to begin
            </div>

          </div>`;
        return face;
      }

      if (data.type === 'backcover') {
        face.classList.add('cover-face');
        face.innerHTML = `
          <div class="cover-inner">
            <div style="font-size:3rem;">❤️</div>
            <div class="cover-title" style="font-size:1.8rem;">Thank You!</div>
            <div class="cover-sub">Visit Again</div>
            <a href="checkout.html" class="btn btn-primary ripple"
               style="margin-top:20px;padding:12px 24px;">Go to Checkout →</a>
            <a href="menu.html" class="btn btn-ghost ripple"
               style="margin-top:10px;padding:10px 20px;">Grid View</a>
          </div>`;
        return face;
      }

      /* Dish list face */
      const inner = document.createElement('div');
      inner.className = 'face-inner';
      inner.innerHTML = `<div class="page-title">${data.emoji} ${data.title}</div>`;
      data.dishes.forEach(d => inner.appendChild(buildDishRow(d)));
      face.appendChild(inner);
      return face;
    }

    /* Build leaf DOM nodes */
    leaves.forEach((leaf, idx) => {
      const pageEl = document.createElement('div');
      pageEl.className = 'page';
      pageEl.style.zIndex = String(leaves.length - idx);
      pageEl.appendChild(buildFace(leaf.front, 'front'));
      if (leaf.back) pageEl.appendChild(buildFace(leaf.back, 'back'));
      book.appendChild(pageEl);
      pages.push(pageEl);

      // Dot
      const dot = document.createElement('div');
      dot.className = 'flip-dot' + (idx === 0 ? ' active' : '');
      indicator.appendChild(dot);
    });

    function updateDots() {
      indicator.querySelectorAll('.flip-dot').forEach((d, i) => {
        d.classList.toggle('active', i === current - 1 || (current === 0 && i === 0));
      });
    }

    /* Next / Prev */
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (current < pages.length) {
        pages[current].classList.add('flipped');
        current++;
        updateDots();
      }
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (current > 0) {
        current--;
        pages[current].classList.remove('flipped');
        updateDots();
      }
    });

    /* Keyboard nav */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
      if (e.key === 'ArrowLeft')  document.getElementById('prevBtn').click();
    });

    syncCartCount();
  });
  </script>
</body>
</html>
